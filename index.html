## JAVASCRIPT REQUIREMENTS (all vanilla, no libraries)

1. Sticky navbar: add class `.scrolled` when window.scrollY > 50 → changes background to white + adds box-shadow
2. Mobile hamburger menu: toggle nav links visibility on click, close on link click
3. Smooth scroll: all anchor `<a href="#...">` links scroll smoothly (also set CSS scroll-behavior: smooth on html)
4. Intersection Observer: all sections and cards fade-in + slide-up when entering viewport (add `.visible` class, CSS handles the transition)
5. Contact form: validation + success message (no page reload)
6. Floating button hover expand: CSS transition, optionally JS for touch devices
